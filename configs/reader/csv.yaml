_target_: audiogear.pipeline.readers.csv.CsvReader
data_folder: ???          # directory containing the metadata CSV (and audio)
glob_pattern: metadata.csv  # which file(s) under data_folder to read
delimiter: "|"
audio_key: audio_file     # column holding the (relative) audio path
id_key: id
limit: -1                 # -1 = all rows; set small for dry runs
recursive: true
