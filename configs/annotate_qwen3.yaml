defaults:
  - reader: ru
  - writer: csv
  - executor: local
  - _self_

hydra:
  job:
    chdir: false
  run:
    dir: .
  output_subdir: null

device: cuda

reader:
  data_folder: ${oc.env:AUDIOGEAR_DATA_DIR,data/your_dataset}
  limit: -1

writer:
  output_folder: outputs
  output_filename: qwen3_annotated_$rank.csv
  sep: "|"

executor:
  tasks: 1
  workers: 1
  gpus: 1
  skip_completed: false
  logging_dir: logs/qwen3_annotation

metrics:
  - _target_: audiogear.pipeline.transcribers.candidate.CandidateTranscriber
    candidate_id_column: asr_qwen3_candidate_id
    status_column: asr_qwen3_status
    text_column: asr_text_qwen3
    error_code_column: asr_qwen3_error_code
    backend:
      _target_: audiogear.pipeline.transcribers.qwen3.Qwen3ASRBackend
      model_name_or_path: Qwen/Qwen3-ASR-1.7B
      revision: 7278e1e70fe206f11671096ffdd38061171dd6e5
      language: Russian
      context: ""
      dtype: bfloat16
      max_inference_batch_size: 1
      max_new_tokens: 256
      device: ${device}
